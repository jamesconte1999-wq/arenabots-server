# fly.toml app configuration file generated for arenabots-server on 2026-05-10T16:11:29+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'arenabots-server'
primary_region = 'syd'

[build]

# Persistent volume for the JSON database (accounts, ladder, Crowns, Pro Pass,
# Stripe purchase history). Survives restarts and redeploys.
[mounts]
  source = "arenabots_data"
  destination = "/data"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
